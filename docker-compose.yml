services:
  dev:
    build: .
    env_file: .env.docker
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-bin:/usr/local/cargo/bin
    working_dir: /app
    command: cargo build

  test:
    build: .
    env_file: .env.docker
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-bin:/usr/local/cargo/bin
    working_dir: /app
    command: cargo test

volumes:
  cargo-cache:
  cargo-bin:
